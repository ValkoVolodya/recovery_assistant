services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: recovery_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recovery_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/recovery_assistant
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    ports:
      - "8000:8000"

volumes:
  postgres_data:
