services:
  - type: web
    name: recovery-assistant
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.12
      - key: DATABASE_URL
        fromDatabase:
          name: recovery-assistant-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_VERIFY_TOKEN
        sync: false
      - key: STRAVA_REDIRECT_URI
        sync: false

databases:
  - name: recovery-assistant-db
    diskSizeGB: 1
    plan: basic-256mb
